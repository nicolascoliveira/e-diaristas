{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block title %} 
        Cadastro de Usuário
{% endblock title %}

{% block content %}
        <div class="card card-primary">
            <div class="card-header">
                <div class="card-title">Cadastro de Usuário</div>
            </div>
            <div class="card-body">

                <form method="post">
                    {% csrf_token %}
                    {%bootstrap_form form_usuario%}
                    <button class="btn btn-primary" type="submit">Cadastrar</button>
                </form>
            </div>
        </div>
{% endblock content %}
