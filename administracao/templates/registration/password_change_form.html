{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block content %}
     <div class="card card-primary">
            <div class="card-header">
                <div class="card-title">Alterar Senha</div>
            </div>
            <div class="card-body">

                <form method="post">
                    {% csrf_token %}
                    {% bootstrap_form form%}
                    <button class="btn btn-primary" type="submit">Salvar</button>
                </form>
            </div>
        </div>
{% endblock content %}
