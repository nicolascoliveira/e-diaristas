{% extends 'base.html' %}

    {% block title %} Listagem de Serviços {% endblock title %}

    {% block content %}
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Lista de serviços</h3>
            </div>
            <div class="card-body p-0">
                <table class="table table-condensed">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Valor minimo</th>
                            <th>Acoes</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for servico in servicos %}
                            <tr>
                                <td>{{servico.nome}}</td>
                                <td>R${{servico.valor_minimo}}</td>
                                <td>
                                    <a href="{% url 'editar_servico' servico.id %}">Editar </a>
                                    <a href="{% url 'excluir_servico' servico.id %}">Excluir </a>
                                </td>
                            </tr>
                            

                            {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        <a class="btn btn-primary" href="{% url 'cadastrar_servico' %}">Cadastrar</a>
    {% endblock content%}
